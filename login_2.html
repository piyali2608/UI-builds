<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CravEX |LOGIN| Preview</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      overflow: hidden;
      font-family: Poppins, sans-serif;
    }

    .background {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, #111, #000);
    }

    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, darkorange, transparent 60%);
      filter: blur(80px);
      animation: float 20s infinite linear;
    }

    .blob1 { top: -100px; left: -100px; }
    .blob2 { bottom: -120px; right: -80px; }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-60px); }
      100% { transform: translateY(0); }
    }

    /* Floating Food Positions */
.food {
  position: absolute;
  font-size: 38px;
  opacity: 0.12;
  animation: floatFood 18s infinite ease-in-out;
}

.f1 { top: 15%; left: 8%; }
.f2 { top: 65%; left: 85%; }
.f3 { top: 80%; left: 20%; }
.f4 { top: 25%; left: 75%; }
.f5 { top: 50%; left: 5%; }
.f6 { top: 10%; left: 55%; }
.f7 { top: 70%; left: 45%; }

@keyframes floatFood {
  0% { transform: translateY(0); }
  50% { transform: translateY(-50px); }
  100% { transform: translateY(0); }
}


   

    .container {
      position: relative;
      z-index: 2;
      width: 400px;
      padding: 30px;
      border-radius: 25px;
      background: rgba(20,20,20,0.95);
      box-shadow: 0 0 40px rgba(255,140,0,0.5);
      text-align: center;
    }

    .toggle {
      width: 240px;
      height: 45px;
      background: black;
      border-radius: 30px;
      margin: auto;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      color: darkorange;
      cursor: pointer;
      box-shadow: 0 0 15px darkorange;
    }

    .switch {
      position: absolute;
      width: 110px;
      height: 38px;
      background: darkorange;
      border-radius: 30px;
      left: 4px;
      transition: 0.4s;
    }

    .active .switch {
      transform: translateX(122px);
    }

    .role-display {
      display: flex;
      justify-content: center;
      gap: 60px;
      font-size: 60px;
      margin: 20px 0;
    }

    .emoji {
      opacity: 0.4;
      transform: scale(0.9);
      transition: 0.4s;
    }

    .emoji.active {
      opacity: 1;
      transform: scale(1.2);
      filter: drop-shadow(0 0 20px darkorange);
    }

    h1 {
      color: white;
    }

    h1 span {
      color: darkorange;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 30px;
      border: none;
      background: #111;
      color: white;
    }

    button {
      width: 100%;
      height: 45px;
      border-radius: 30px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    .login {
      background: darkorange;
      color: black;
    }

    .register {
      background: transparent;
      color: darkorange;
      border: 2px solid darkorange;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

function App() {
  const [isVendor, setIsVendor] = React.useState(false);

  return (
    <>
      <div className="background">
        <div className="blob blob1"></div>
        <div className="blob blob2"></div>

        {/* Floating Food Emojis */}
        <div className="food f1">🍕</div>
        <div className="food f2">🍔</div>
        <div className="food f3">🍟</div>
        <div className="food f4">🍲</div>
        <div className="food f5">🍗</div>
        <div className="food f6">🥗</div>
        <div className="food f7">🍱</div>
      </div>

      <div className="container">
        <div 
          className={`toggle ${isVendor ? "active" : ""}`} 
          onClick={() => setIsVendor(!isVendor)}
        >
          <div className="switch"></div>
          <span>Student</span>
          <span>Vendor</span>
        </div>

        <div className="role-display">
          <span className={`emoji ${!isVendor ? "active" : ""}`}>🎓</span>
          <span className={`emoji ${isVendor ? "active" : ""}`}>🧑‍🍳</span>
        </div>

        <h1>
          <span>CRAVEX</span> {isVendor ? "Vendor" : "Student"} Login
        </h1>

        <input placeholder="Username" />
        <input type="password" placeholder="Password" />

        <button className="login">Login</button>
        <button className="register">Register</button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>


</body>
</html>

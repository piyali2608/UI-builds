!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRAVEX | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    overflow: hidden;
}

/* ===== BACKGROUND ===== */
.background {
    position: fixed;
    inset: 0;
    background: url("https://www.justdial.com/Chittoor/Iiit-Sri-City-Chittoor/9999P8572-8572-231222034001-N8F6_BZDET") center/cover no-repeat;
    filter: blur(14px) brightness(0.35);
    z-index: -3;
}

/* ===== ABSTRACT ORANGE BLOBS ===== */
.abstract-bg {
    position: fixed;
    inset: 0;
    z-index: -2;
    overflow: hidden;
}

.abstract-bg span {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, darkorange, transparent 60%);
    filter: blur(50px);
    opacity: 0.6;
    animation: float 20s infinite linear;
}

.abstract-bg span:nth-child(1) { top: -80px; left: -80px; }
.abstract-bg span:nth-child(2) { bottom: -100px; right: -60px; animation-duration: 25s; }
.abstract-bg span:nth-child(3) { top: 40%; left: 60%; animation-duration: 22s; }

@keyframes float {
    0% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-60px) rotate(180deg); }
    100% { transform: translateY(0) rotate(360deg); }
}

/* ===== CONTAINER ===== */
.container {
    width: 420px;
    padding: 30px;
    border-radius: 30px;
    text-align: center;
    backdrop-filter: blur(20px);
    background: linear-gradient(160deg, rgba(0,0,0,0.9), rgba(20,20,20,0.95));
    box-shadow: 0 0 40px rgba(255,140,0,0.6),
                inset 0 0 30px rgba(255,140,0,0.15);
    position: relative;
    overflow: hidden;
}

/* glowing border animation */
.container::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 32px;
    background: linear-gradient(120deg, transparent, rgba(255,140,0,0.6), transparent);
    animation: shine 6s infinite linear;
}

@keyframes shine {
    from { transform: translateX(-100%); }
    to { transform: translateX(100%); }
}

/* ===== TOGGLE ===== */
#roleToggle { display: none; }

.toggle {
    width: 260px;
    height: 45px;
    background: black;
    border-radius: 30px;
    margin: auto;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    color: darkorange;
    cursor: pointer;
    box-shadow: 0 0 15px darkorange;
}

.switch {
    position: absolute;
    width: 120px;
    height: 38px;
    background: darkorange;
    border-radius: 30px;
    left: 4px;
    transition: 0.4s;
}

#roleToggle:checked + .toggle .switch {
    transform: translateX(132px);
}

/* ===== 3D FOOD SVG ===== */
.food-3d {
    margin: 20px 0;
    perspective: 800px;
}

.food-svg {
    width: 120px;
    animation: foodFloat 4s ease-in-out infinite;
    filter: drop-shadow(0 20px 25px rgba(255,140,0,0.7));
}

@keyframes foodFloat {
    0% { transform: rotateX(0deg) translateY(0); }
    50% { transform: rotateX(18deg) translateY(-15px); }
    100% { transform: rotateX(0deg) translateY(0); }
}

/* ===== TEXT ===== */
h1 {
    color: white;
    margin-bottom: 15px;
}
h1 span { color: darkorange; }

/* ===== INPUTS ===== */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 30px;
    border: none;
    outline: none;
    background: rgba(0,0,0,0.7);
    color: white;
}

input:focus {
    box-shadow: 0 0 15px darkorange;
    transform: scale(1.02);
}

/* ===== FLIP CARD BUTTON ===== */
.flip-card {
    width: 100%;
    height: 55px;
    perspective: 1000px;
    margin-top: 20px;
}

.flip-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.8s;
    transform-style: preserve-3d;
}

.flip-card:hover .flip-inner {
    transform: rotateY(180deg);
}

.flip-front, .flip-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
}

.flip-back {
    transform: rotateY(180deg);
}

/* ===== BUTTONS ===== */
.btn {
    width: 100%;
    height: 55px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

.login {
    background: darkorange;
    color: black;
    box-shadow: 0 0 25px darkorange;
    animation: pulse 2s infinite;
}

.register {
    background: transparent;
    color: darkorange;
    border: 2px solid darkorange;
}

@keyframes pulse {
    0% { box-shadow: 0 0 15px darkorange; }
    50% { box-shadow: 0 0 35px darkorange; }
    100% { box-shadow: 0 0 15px darkorange; }
}
</style>
</head>

<body>

<div class="background"></div>

<div class="abstract-bg">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="container">

    <!-- ROLE TOGGLE -->
    <input type="checkbox" id="roleToggle">
    <label for="roleToggle" class="toggle">
        <span>Student</span>
        <span>Vendor</span>
        <div class="switch"></div>
    </label>

    <!-- 3D FOOD -->
    <div class="food-3d">
        <svg viewBox="0 0 200 200" class="food-svg">
            <ellipse cx="100" cy="80" rx="70" ry="25" fill="darkorange"/>
            <rect x="40" y="80" width="120" height="20" rx="10" fill="#3b1f00"/>
            <rect x="45" y="100" width="110" height="15" rx="8" fill="#f5cfa0"/>
            <ellipse cx="100" cy="120" rx="65" ry="20" fill="darkorange"/>
        </svg>
    </div>

    <h1><span>CRAVEX</span> Login</h1>

    <form>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">

        <!-- FLIP CARD -->
        <div class="flip-card">
            <div class="flip-inner">
                <div class="flip-front">
                    <button class="btn login">Login</button>
                </div>
                <div class="flip-back">
                    <button class="btn register">Register</button>
                </div>
            </div>
        </div>
    </form>

</div>

</body>
</html>
